# =====================================================================
# Synthetic Floor (7 Stages) – Master Configuration
# =====================================================================
# This file controls EVERYTHING about the example dataset:
#   - the floor's geometric layout (a single 22×14m room)
#   - the seven construction stages (open frame → fully finished)
#   - the camera and smartphone simulation parameters
#   - the renderer settings
#   - the output paths
#
# All units are SI (meters, seconds, radians) unless noted.
# Coordinate system: right-handed, +Z up.
# Origin (0,0,0) is the south-west corner of the slab at floor level.
#
# The pipeline is 100% deterministic. random_seed controls everything.
# =====================================================================

project:
  name: synthetic_floor_7stage
  run_id: "v2"
  description: >
    Single 22×14m room simulating progressive construction over 7
    stages: from bare structural frame with open perimeters through
    cinderblock enclosure, plastering, door/window installation,
    to a fully finished white interior with recessed ceiling lights.
  random_seed: 42

# ---------------------------------------------------------------------
# 1) Floor geometry
# ---------------------------------------------------------------------
# A single large rectangular room (no internal partitions).
# 22m long (X, east-west), 14m wide (Y, north-south), 3.2m high.
#
# Perimeter walls are built progressively (cinderblock infill between
# structural pillars). The structural frame (pillars + slab) is present
# from stage 1.
#
# Wall naming convention (viewed from inside, looking outward):
#   - SOUTH wall: front facade (Y = 0)
#   - NORTH wall: back facade  (Y = 14)
#   - WEST wall:  left side    (X = 0)
#   - EAST wall:  right side   (X = 22)

floor:
  length_m: 22.0          # X axis (east-west)
  width_m: 14.0           # Y axis (north-south)
  height_m: 3.20          # floor to ceiling
  slab_thickness_m: 0.22  # reinforced concrete floor slab
  exterior_wall_thickness_m: 0.20  # cinderblock infill
  interior_wall_thickness_m: 0.0   # no internal partitions
  # Structural grid: pillars at grid intersections
  grid:
    bays_x: 4            # 5 pillar lines along X (at 0, 5.5, 11, 16.5, 22)
    bays_y: 2            # 3 pillar lines along Y (at 0, 7, 14)
    column_size_m: 0.45  # square cross-section
  # Door opening (one door on the left/west wall)
  door_opening:
    width_m: 1.00
    height_m: 2.20
  # Window openings (back/north wall gets 2, right/east wall gets 1).
  # These are LARGE openings — light pours in through them.
  window_opening:
    width_m: 2.40         # 2.4m wide windows
    height_m: 1.80        # 1.8m tall
    sill_height_m: 0.80   # sill 80cm above floor (low sill, lots of light)
  # No internal rooms — single open space.
  rooms: []
  # One door on the west (left) wall.
  doors:
    - id: DOOR_MAIN
      from: EXTERIOR
      to: INTERIOR
      side: west
      offset_m: 2.5       # 2.5m from the SW corner along the west facade
  # Three exterior windows: 2 on back (north), 1 on right (east).
  windows:
    - { id: WIN_N1, facade: north, offset_m: 7.0  }   # north wall, centered at X=7
    - { id: WIN_N2, facade: north, offset_m: 15.0 }   # north wall, centered at X=15
    - { id: WIN_E1, facade: east,  offset_m: 7.0  }   # east wall, centered at Y=7

# ---------------------------------------------------------------------
# 2) Construction stages
# ---------------------------------------------------------------------
# The 7 stages simulate real construction progression for a single
# room going from bare structural frame to a fully finished interior.
#
# Key progression:
#   Stage 1: bare structure (columns + slab) + partial sill masonry
#   Stage 2: back (north) wall cinderblock with 2 window openings
#   Stage 3: left (west) wall partial masonry + rough door opening
#   Stage 4: full perimeter enclosure (all cinderblock walls done)
#   Stage 5: partial rendering/plastering (left wall lower half)
#   Stage 6: full left wall plaster + metal door installed
#   Stage 7: all walls plastered + painted white, windows installed,
#             finished ceiling with recessed lights
#
# Categories redefined for this room:
#   slab:           floor slab (always present from stage 1)
#   columns:        structural pillars (always present)
#   ceiling_slab:   raw concrete ceiling (visible stages 1-6, hidden stage 7)
#   ceiling_finish: finished dropped ceiling (stage 7 only)
#   north_wall:     back wall cinderblock infill
#   east_wall:      right wall cinderblock infill
#   west_wall:      left wall cinderblock infill
#   south_wall:     front wall cinderblock infill (never gets windows)
#   sill_north:     low masonry sill on north wall (stage 1 only)
#   sill_east:      low masonry sill on east wall (stage 1 only)
#   windows:        window frame + glass (stage 7 only)
#   door:           metal door panel (stage 6-7)
#   plaster_left_lower:   half-height plaster on left wall (stage 5+)
#   plaster_left_upper:   upper plaster on left wall (stage 6+)
#   plaster_other:        plaster on remaining walls (stage 7)
#   ceiling_lights: recessed square fixtures (stage 7 only)
#   overhead_pipes: visible pipes under raw ceiling (stages 1-6)

stages:
  - id: 1
    name: "Structural Frame + Sills"
    description: >
      Exposed RC skeleton: slab, ceiling slab, pillars, overhead pipes.
      Partial low masonry sills on back (north) and right (east) walls
      (~1m high). Left and south perimeters completely open.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: raw_concrete }
      ceiling_slab:       { completion: 1.0, finishing: raw_concrete }
      overhead_pipes:     { completion: 1.0, finishing: raw_concrete }
      sill_north:         { completion: 1.0, finishing: cinderblock }
      sill_east:          { completion: 1.0, finishing: cinderblock }
      north_wall:         { completion: 0.0, finishing: cinderblock }
      east_wall:          { completion: 0.0, finishing: cinderblock }
      west_wall:          { completion: 0.0, finishing: cinderblock }
      south_wall:         { completion: 0.0, finishing: cinderblock }
      windows:            { completion: 0.0, finishing: none }
      door:               { completion: 0.0, finishing: none }
      ceiling_finish:     { completion: 0.0, finishing: none }
      ceiling_lights:     { completion: 0.0, finishing: none }
      plaster_left_lower: { completion: 0.0, finishing: none }
      plaster_left_upper: { completion: 0.0, finishing: none }
      plaster_other:      { completion: 0.0, finishing: none }

  - id: 2
    name: "Back Wall Framing"
    description: >
      North (back) wall cinderblock laid floor-to-ceiling between pillars,
      creating 2 distinct window openings. Sills are now incorporated
      into the full-height wall. East sill unchanged. Left & south open.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: raw_concrete }
      ceiling_slab:       { completion: 1.0, finishing: raw_concrete }
      overhead_pipes:     { completion: 1.0, finishing: raw_concrete }
      sill_north:         { completion: 0.0, finishing: cinderblock }  # absorbed into full wall
      sill_east:          { completion: 1.0, finishing: cinderblock }
      north_wall:         { completion: 1.0, finishing: cinderblock }
      east_wall:          { completion: 0.0, finishing: cinderblock }
      west_wall:          { completion: 0.0, finishing: cinderblock }
      south_wall:         { completion: 0.0, finishing: cinderblock }
      windows:            { completion: 0.0, finishing: none }
      door:               { completion: 0.0, finishing: none }
      ceiling_finish:     { completion: 0.0, finishing: none }
      ceiling_lights:     { completion: 0.0, finishing: none }
      plaster_left_lower: { completion: 0.0, finishing: none }
      plaster_left_upper: { completion: 0.0, finishing: none }
      plaster_other:      { completion: 0.0, finishing: none }

  - id: 3
    name: "Left Wall Masonry Initiation"
    description: >
      West (left) wall cinderblock begins between pillars. Defines a
      rough doorway opening on far left. Masonry is uneven/incomplete
      at top. East sill still low, south still open.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: raw_concrete }
      ceiling_slab:       { completion: 1.0, finishing: raw_concrete }
      overhead_pipes:     { completion: 1.0, finishing: raw_concrete }
      sill_north:         { completion: 0.0, finishing: cinderblock }
      sill_east:          { completion: 1.0, finishing: cinderblock }
      north_wall:         { completion: 1.0, finishing: cinderblock }
      east_wall:          { completion: 0.0, finishing: cinderblock }
      west_wall:          { completion: 0.7, finishing: cinderblock }  # partial height
      south_wall:         { completion: 0.0, finishing: cinderblock }
      windows:            { completion: 0.0, finishing: none }
      door:               { completion: 0.0, finishing: none }
      ceiling_finish:     { completion: 0.0, finishing: none }
      ceiling_lights:     { completion: 0.0, finishing: none }
      plaster_left_lower: { completion: 0.0, finishing: none }
      plaster_left_upper: { completion: 0.0, finishing: none }
      plaster_other:      { completion: 0.0, finishing: none }

  - id: 4
    name: "Perimeter Enclosure Complete"
    description: >
      All four walls completed floor-to-ceiling in raw cinderblock.
      All rough openings finalized: 1 door (west), 2 windows (north),
      1 large window (east). Room is fully enclosed but raw/unfinished.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: raw_concrete }
      ceiling_slab:       { completion: 1.0, finishing: raw_concrete }
      overhead_pipes:     { completion: 1.0, finishing: raw_concrete }
      sill_north:         { completion: 0.0, finishing: cinderblock }
      sill_east:          { completion: 0.0, finishing: cinderblock }  # absorbed into east_wall
      north_wall:         { completion: 1.0, finishing: cinderblock }
      east_wall:          { completion: 1.0, finishing: cinderblock }
      west_wall:          { completion: 1.0, finishing: cinderblock }
      south_wall:         { completion: 1.0, finishing: cinderblock }
      windows:            { completion: 0.0, finishing: none }
      door:               { completion: 0.0, finishing: none }
      ceiling_finish:     { completion: 0.0, finishing: none }
      ceiling_lights:     { completion: 0.0, finishing: none }
      plaster_left_lower: { completion: 0.0, finishing: none }
      plaster_left_upper: { completion: 0.0, finishing: none }
      plaster_other:      { completion: 0.0, finishing: none }

  - id: 5
    name: "Partial Rendering"
    description: >
      A base coat of smooth white plaster applied to the LOWER HALF
      of the west (left) wall only. All other walls, ceiling, and
      right/back walls remain raw cinderblock.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: raw_concrete }
      ceiling_slab:       { completion: 1.0, finishing: raw_concrete }
      overhead_pipes:     { completion: 1.0, finishing: raw_concrete }
      sill_north:         { completion: 0.0, finishing: cinderblock }
      sill_east:          { completion: 0.0, finishing: cinderblock }
      north_wall:         { completion: 1.0, finishing: cinderblock }
      east_wall:          { completion: 1.0, finishing: cinderblock }
      west_wall:          { completion: 1.0, finishing: cinderblock }
      south_wall:         { completion: 1.0, finishing: cinderblock }
      windows:            { completion: 0.0, finishing: none }
      door:               { completion: 0.0, finishing: none }
      ceiling_finish:     { completion: 0.0, finishing: none }
      ceiling_lights:     { completion: 0.0, finishing: none }
      plaster_left_lower: { completion: 1.0, finishing: plaster_base }
      plaster_left_upper: { completion: 0.0, finishing: none }
      plaster_other:      { completion: 0.0, finishing: none }

  - id: 6
    name: "Full Left Wall Render + Door"
    description: >
      White render completed floor-to-ceiling on the west (left) wall.
      A solid grey metal door is installed in the doorway. Back and
      right walls remain raw cinderblock. Ceiling raw concrete + pipes.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: raw_concrete }
      ceiling_slab:       { completion: 1.0, finishing: raw_concrete }
      overhead_pipes:     { completion: 1.0, finishing: raw_concrete }
      sill_north:         { completion: 0.0, finishing: cinderblock }
      sill_east:          { completion: 0.0, finishing: cinderblock }
      north_wall:         { completion: 1.0, finishing: cinderblock }
      east_wall:          { completion: 1.0, finishing: cinderblock }
      west_wall:          { completion: 1.0, finishing: cinderblock }
      south_wall:         { completion: 1.0, finishing: cinderblock }
      windows:            { completion: 0.0, finishing: none }
      door:               { completion: 1.0, finishing: metal_grey }
      ceiling_finish:     { completion: 0.0, finishing: none }
      ceiling_lights:     { completion: 0.0, finishing: none }
      plaster_left_lower: { completion: 1.0, finishing: painted_white }
      plaster_left_upper: { completion: 1.0, finishing: painted_white }
      plaster_other:      { completion: 0.0, finishing: none }

  - id: 7
    name: "Final Finishes"
    description: >
      All remaining cinderblock walls plastered and painted white.
      White-framed glazed windows installed in all 3 openings.
      Finished flat white ceiling with 6 recessed square light fixtures.
      Overhead pipes concealed. Metal door remains. Floor unchanged.
    elements:
      slab:               { completion: 1.0, finishing: raw_concrete }
      columns:            { completion: 1.0, finishing: painted_white }
      ceiling_slab:       { completion: 0.0, finishing: none }          # hidden by ceiling_finish
      overhead_pipes:     { completion: 0.0, finishing: none }          # hidden by ceiling
      sill_north:         { completion: 0.0, finishing: none }
      sill_east:          { completion: 0.0, finishing: none }
      north_wall:         { completion: 1.0, finishing: painted_white }
      east_wall:          { completion: 1.0, finishing: painted_white }
      west_wall:          { completion: 1.0, finishing: painted_white }
      south_wall:         { completion: 1.0, finishing: painted_white }
      windows:            { completion: 1.0, finishing: window_glazed }
      door:               { completion: 1.0, finishing: metal_grey }
      ceiling_finish:     { completion: 1.0, finishing: painted_white }
      ceiling_lights:     { completion: 1.0, finishing: light_fixture }
      plaster_left_lower: { completion: 1.0, finishing: painted_white }
      plaster_left_upper: { completion: 1.0, finishing: painted_white }
      plaster_other:      { completion: 1.0, finishing: painted_white }

# ---------------------------------------------------------------------
# 3) Camera and smartphone simulation
# ---------------------------------------------------------------------
camera:
  motion:
    coverage_lane_spacing_m: 3.0
    collision_margin_m: 0.65
    column_clearance_m: 0.45
    path_smoothness: 0.5
    scan_yaw_amplitude_deg: 72.0
    scan_period_sec: 8.5
    turn_around_interval_sec: 13.0
    turn_around_duration_sec: 3.2
    gaze_inertia_tau_sec: 0.55
    focus_distance_m: 4.5
    pitch_scan_amplitude_deg: 14.0
    pitch_scan_period_sec: 6.0
    vertical_inspect_enabled: true
    crouch_height_m: 0.8
    rise_height_m: 2.15
    vertical_inspect_interval_sec: 11.0
    vertical_inspect_duration_sec: 4.2
    inspect_pitch_deg: 34.0
  width_px: 640
  height_px: 360
  fps: 30
  # ~26mm equivalent on full-frame (typical smartphone main camera)
  horizontal_fov_deg: 72.0
  k1: -0.03
  k2: 0.008
  # Camera held at chest height by a walking person
  hold_height_m: 1.55
  # Clip duration per stage for CPU pipeline (GPU uses --frames flag)
  duration_per_stage_sec: 4.0
  walk_speed_m_s: 0.70        # slow walk inside a construction site
  look_at_height_m: 1.50
  hand_jitter:
    translation_amplitude_m: 0.014
    rotation_amplitude_deg: 0.8
    breathing_period_s: 3.5
    walking_period_s: 0.58
    walking_pitch_amp_deg: 0.6
    walking_yaw_amp_deg: 0.4
    walking_z_amp_m: 0.014
  exposure:
    target_brightness: 0.45
    adapt_speed: 0.10
    max_ev_change_per_frame: 0.06
  noise:
    iso_equivalent: 250.0
    read_noise_sigma: 0.014
    photon_scale: 1.0
  motion_blur:
    shutter_fraction: 0.5
    samples: 4
  rolling_shutter:
    row_delay_sec: 0.001

# ---------------------------------------------------------------------
# 4) Renderer (CPU software rasterizer fallback)
# ---------------------------------------------------------------------
renderer:
  backend: software_rasterizer
  ambient_light: 0.22
  sun_azimuth_deg: 135.0
  sun_elevation_deg: 38.0
  sun_color: [1.00, 0.96, 0.88]
  sky_color: [0.55, 0.70, 0.95]
  shadow_softness: 0.25
  vignette_strength: 0.18
  emit_material_samples: true

# ---------------------------------------------------------------------
# 5) Blender GPU renderer settings
# ---------------------------------------------------------------------
# These are defaults used by blender_gpu_renderer.py. They can be
# overridden via CLI flags (--samples, --resolution, etc.).
blender:
  # Cycles light path bounces — CRITICAL for interior rendering.
  # Interior scenes need high bounces so light from the sky/sun can
  # bounce off walls and illuminate the whole room.
  max_bounces: 12
  diffuse_bounces: 8
  glossy_bounces: 4
  transmission_bounces: 12
  transparent_max_bounces: 12
  volume_bounces: 0
  # Exposure: slightly bright to simulate smartphone auto-exposure
  # in a construction environment (cameras overexpose slightly indoors).
  exposure: 1.2
  # Sun settings
  sun_energy: 5.0
  sun_angle_deg: 0.55
  # Sky texture strength
  sky_strength: 1.2
  # Light portals at window openings (critical for noise reduction)
  use_light_portals: true
  # Interior ceiling lights for stage 7
  ceiling_light_energy: 80.0       # watts per fixture
  ceiling_light_color: [1.0, 0.97, 0.92]  # warm white
  ceiling_light_count: 6
  # Denoiser
  denoiser: OPENIMAGEDENOISE

# ---------------------------------------------------------------------
# 6) Output paths
# ---------------------------------------------------------------------
output:
  root: output
  bim_dir: bim
  mesh_dir: mesh
  renders_dir: renders
  video_dir: video
  depth_dir: depth
  segmentation_dir: segmentation
  camera_dir: camera
  manifests_dir: manifests
  logs_dir: logs
