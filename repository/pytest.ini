[pytest]
pythonpath = .
testpaths = tests
markers =
    lightweight: laptop-safe tests that should run without heavy GPU/model/runtime data
    geometry: tests requiring Open3D/IfcOpenShell geometry dependencies
    server: tests intended for server preflight or server-only inputs
    vlm: tests involving real VLM endpoints or model availability
    colmap: tests involving COLMAP binaries or reconstruction fixtures
    slow: tests that may be slow on laptop
