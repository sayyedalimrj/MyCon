services:
  core:
    image: construction-core-dev:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.core-dev
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: bash

  da3:
    image: construction-da3-dev:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.da3-dev
    volumes:
      - ..:/workspace
      - ~/.cache/huggingface:/root/.cache/huggingface
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: bash